name: Deploy Web

on:
  push:
    branches:
      - web

env:
  REGISTRY: ghcr.io
  # Image name will be: ghcr.io/<owner>/votera-app
  IMAGE_NAME: ${{ github.repository_owner }}/votera-app

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Build the Flutter web app and push the nginx image to ghcr.io
  # ------------------------------------------------------------------ #
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is provided automatically — no extra secret needed.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build only the runtime stage (nginx with baked-in Flutter artifacts).
          # The builder stage runs inside Docker's layer cache automatically.
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FLUTTER_BASE_HREF=/
          # Persist the build cache in GitHub Actions so Flutter deps and the
          # compiled output are reused on the next push if nothing changed.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # Job 2: SSH to the server, pull the new image, and restart the service
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build   # only runs after the image is successfully pushed

    permissions:
      packages: read   # allows GITHUB_TOKEN to pull from ghcr.io

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Pass the workflow's own token to the server — no stored PAT needed.
          # GH_TOKEN is valid only for the duration of this workflow run, so
          # no credentials are left on the server after the deploy completes.
          envs: GH_TOKEN,GH_ACTOR
          script: |
            set -e

            # Log in with the ephemeral workflow token to pull the new image.
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            cd ${{ secrets.SERVER_APP_PATH }}

            # Pull the freshly built image.
            docker compose pull votera-web

            # Swap the running container. Only the container restart causes
            # a brief interruption (~1 s); the pull step has no downtime.
            docker compose up -d --force-recreate votera-web

            # Remove registry credentials immediately — the token is ephemeral
            # anyway, but this keeps the server clean.
            docker logout ghcr.io
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
