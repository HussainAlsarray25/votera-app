<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <!-- Required for iOS Safari to render at the correct device width.
       Without this, iOS uses a 980px virtual viewport, causing Flutter's
       canvas to be sized incorrectly and resulting in a blank white screen. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="votera">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Votera</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Diagnostic loading screen visible before Flutter mounts.
       If this disappears: Flutter Dart code ran successfully.
       If this stays forever: Flutter engine loaded but Dart never mounted. -->
  <div id="loading" style="
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#0f1117; color:#ffffff; font-family:sans-serif;
    font-size:16px; z-index:9999;">
    <div style="
      width:56px; height:56px; border-radius:14px;
      background:#6C63FF; display:flex; align-items:center;
      justify-content:center; font-size:28px; font-weight:800;
      margin-bottom:20px;">V</div>
    <div id="loading-msg">Loading…</div>
  </div>
  <script>
    function showError(text) {
      var msg = document.getElementById('loading-msg');
      if (msg) { msg.style.color = '#ff6b6b'; msg.textContent = 'Error: ' + text; }
    }

    // Show any unhandled JS / Promise error in the loading screen.
    window.addEventListener('error', function(e) { showError(e.message); });
    window.addEventListener('unhandledrejection', function(e) { showError(String(e.reason)); });

    // Remove the loading screen when Flutter's canvas appears in the DOM.
    var observer = new MutationObserver(function(mutations) {
      for (var m of mutations) {
        for (var node of m.addedNodes) {
          if (node.nodeName === 'CANVAS' || node.nodeName === 'FLT-GLASS-PANE') {
            var loading = document.getElementById('loading');
            if (loading) loading.remove();
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // After 10 seconds without Flutter mounting, show a timeout message.
    setTimeout(function() {
      var msg = document.getElementById('loading-msg');
      if (msg && msg.textContent === 'Loading\u2026')
        msg.textContent = 'JS engine running — Dart not yet rendered. Check console.';
    }, 10000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
