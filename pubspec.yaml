name: votera
description: Votera App
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  bloc: ^9.1.0
  dartz: ^0.10.1
  dio: ^5.9.0
  equatable: ^2.0.5
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.9
  get_it: ^9.1.1
  geolocator: ^13.0.2
  go_router: ^14.8.1
  google_fonts: ^6.3.2
  intl: ^0.20.2
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.2.2
  app_links: ^6.3.4
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.7.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/features/authentication/
    - assets/images/features/onboarding/
    - assets/images/features/home/
    - assets/images/features/profile/
