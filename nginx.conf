server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip common static/text responses.
  # gzip_proxied ensures gzip applies even when sitting behind the main nginx.
  gzip on;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

  # Firebase SDK uses inline scripts; this CSP allows them while locking down
  # everything else. Adjust connect-src if more API origins are needed.
  # 'wasm-unsafe-eval' is required for Flutter's CanvasKit renderer to execute
  # WebAssembly on iOS Safari/WebKit, which enforces CSP strictly unlike Chrome.
  # Firebase dynamically imports its JS modules (e.g. firebase-messaging.js)
  # from gstatic.com at runtime. iOS Safari enforces CSP strictly and blocks
  # these fetch requests unless gstatic.com is explicitly listed in connect-src.
  # Android Chrome is lenient and ignores missing connect-src entries, which is
  # why the app worked on Android but showed a white screen on iOS.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://www.gstatic.com https://*.votera.space wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com;";

  # Flutter service worker and index should not be aggressively cached.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  location = /flutter_service_worker.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Static hashed assets can be cached for a long time.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Support deep links from go_router by falling back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}