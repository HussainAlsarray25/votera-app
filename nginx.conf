server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip common static/text responses.
  # gzip_proxied ensures gzip applies even when sitting behind the main nginx.
  gzip on;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

  # CSP is applied per location block below (not here at server level) because
  # nginx does not inherit add_header into child location blocks that define
  # their own add_header directives — the CSP would silently disappear.

  # Flutter service worker and index should not be aggressively cached.
  # NOTE: nginx does not inherit add_header from parent blocks when a location
  # defines its own add_header directives, so the CSP must be repeated here.
  location = /index.html {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://www.gstatic.com https://*.votera.space wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com;";
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  location = /flutter_service_worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Static hashed assets can be cached for a long time.
  # No CSP needed here — assets are subresources, policy is enforced from index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Support deep links from go_router by falling back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}